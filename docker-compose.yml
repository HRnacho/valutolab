services:

  nginx:
    image: nginx:alpine
    container_name: valutolab-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: valutolab-backend
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=3001
    expose:
      - "3001"
    restart: unless-stopped

networks:
  default:
    name: valutolab-network
